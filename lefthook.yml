min_version: 1.12.0

pre-commit:
  parallel: true
  commands:
    stylelint:
      root: src/themes/default-theme/
      glob: "*.scss"
      run: pnpm exec stylelint {staged_files}
    prettier:
      root: src/themes/default-theme/
      glob: "*.scss"
      run: pnpm exec prettier --check {staged_files}

commit-msg:
  commands:
    conventional-commit:
      run: npx commitlint --edit {1}

pre-push:
  commands:
    build:
      root: src/themes/default-theme/
      run: pnpm run build

post-merge:
  commands:
    install-deps:
      files: git diff --name-only HEAD@{1} HEAD
      glob: "**/package.json"
      run: pnpm run install:deps

post-checkout:
  commands:
    install-deps:
      files: git diff --name-only {1} {2}
      glob: "**/package.json"
      run: pnpm run install:deps

post-rewrite:
  commands:
    install-deps:
      files: git diff --name-only HEAD@{1} HEAD
      glob: "**/package.json"
      run: pnpm run install:deps